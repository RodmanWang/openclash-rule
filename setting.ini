[custom]
;ruleset，从本地或 url 获取规则片段
ruleset=DIRECT,https://raw.githubusercontent.com/RodmanWang/openclash-rule/main/list/User·agent.list
ruleset=DIRECT,[]GEOIP,CN
ruleset=🐟Other,[]FINAL
enable_rule_generator=true
overwrite_original_rules=true
;字母大小写有区别
custom_proxy_group=🚀Proxy`select`[]🚀AutoProxy`[]HK 🇭🇰`[]SG 🇸🇬`[]TW 🇨🇳`[]JP 🇯🇵`[]KR 🇰🇷`[]EUR 🇪🇺
custom_proxy_group=🎮Game`select`[]🎮Game·Auto`[]👋Game·Manual
custom_proxy_group=🎥Netflix`select`[]🎞NF·Auto`[]SG 🇸🇬
custom_proxy_group=🎥General·Media`select`[]🎞Media·Auto`[]HK 🇭🇰
custom_proxy_group=📺US·Media`select`[]🎞US·Auto`[]US 🇺🇲
custom_proxy_group=📺HK·Media`select`[]🎞TVB·Auto`[]HK 🇭🇰
custom_proxy_group=📺EUR·Media`select`[]🎥General·Media`[]EUR 🇪🇺
custom_proxy_group=📺TW·Media`select`[]🎥General·Media`[]TW 🇨🇳
custom_proxy_group=📺JP·Media`select`[]🎥General·Media`[]JP 🇯🇵
custom_proxy_group=📺KR·Media`select`[]🎥General·Media`[]KR 🇰🇷
custom_proxy_group=💻Microsoft`select`[]DIRECT`[]🚀Proxy
custom_proxy_group=🍎Apple`select`[]DIRECT`[]🚀Proxy
custom_proxy_group=🐟Other`select`[]🚀Proxy`[]DIRECT
custom_proxy_group=⛔AD·Block`select`[]REJECT`[]DIRECT
custom_proxy_group=🚀AutoProxy`url-test`(40[1-3]|港.*(A($|.*江)|B.*[莞波江津北济郑重])|Geneva)`http://www.gstatic.com/generate_204`600
custom_proxy_group=🎮Game·Auto`url-test`(40[1-3]|Vio|Geneva)`http://www.gstatic.com/generate_204`600
custom_proxy_group=🎞NF·Auto`url-test`([012][UT].*SG.*NF\*|[直中].*狮.[津西苏])`http://www.gstatic.com/generate_204`10800
custom_proxy_group=🎞Media·Auto`url-test`(40[1-3]|港.*(A($|.*江)|B.*[莞波江津北济郑重]))`http://www.gstatic.com/generate_204`10800
custom_proxy_group=🎞US·Auto`url-test`(US.*NBU\*|Vio)`http://www.gstatic.com/generate_204`10800
custom_proxy_group=🎞TVB·Auto`url-test`(42[0-2]|DMIT)`http://www.gstatic.com/generate_204`10800
custom_proxy_group=👋Game·Manual`select`(IEPL$)
custom_proxy_group=HK 🇭🇰`select`(港|HK)
custom_proxy_group=TW 🇨🇳`select`(台|新北|彰化|TW|Tai)
custom_proxy_group=SG 🇸🇬`select`(新|狮城|SG|Singa)
custom_proxy_group=JP 🇯🇵`select`(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Jap)
custom_proxy_group=KR 🇰🇷`select`(韩国|首尔|KR)
custom_proxy_group=US 🇺🇲`select`(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US)
custom_proxy_group=EUR 🇪🇺`select`(英|德|意|法|伦敦|DE|GB|IT$|FR|RO|NL|UK|CH)

;用于包含或排除节点关键词的选项 会覆盖 pref.ini 里的内容
include_remarks=NF\*|NBU\*|UK\*|IEPL|DMIT|DE|KR|Gen|Den|Vio|BGP.*JP|[港狮台日].*电|京L|BGP
exclude_remarks=V3
